                  const preC=FATIGUE_COL[FATIGUE_SCORE[s.fatigue_pre]]||"#333";
                  const postC=FATIGUE_COL[FATIGUE_SCORE[s.fatigue_post]]||"#333";
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:9,fontFamily:"monospace"}}>
                      <span style={{color:"#444",width:60,flexShrink:0}}>{new Date(s._dk+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
                      <span style={{color:a.color,width:40,flexShrink:0}}>{a.short}</span>
                      {s.fatigue_pre&&<span style={{color:preC,background:preC+"18",borderRadius:3,padding:"1px 5px"}}>in: {s.fatigue_pre}</span>}
                      {s.fatigue_post&&<span style={{color:postC,background:postC+"18",borderRadius:3,padding:"1px 5px"}}>out: {s.fatigue_post}</span>}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>

        {/* ── Session notes search ── */}
        <div style={{background:"#0d0d0d",border:"1px solid #181818",borderRadius:12,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontSize:9,letterSpacing:"0.18em",color:"#3a3a3a",fontFamily:"monospace",marginBottom:10}}>SESSION NOTES SEARCH</div>
          <input
            style={{background:"#090909",border:"1px solid #1e1e1e",borderRadius:7,padding:"8px 12px",color:"#bbb",fontSize:11,fontFamily:"monospace",outline:"none",width:"100%",boxSizing:"border-box",marginBottom:10}}
            placeholder="Search notes… e.g. knee, tired, fast"
            value={noteSearch}
            onChange={e=>setNoteSearch(e.target.value)}
          />
          {noteSearch.trim().length>=2&&noteResults.length===0&&(
            <div style={{color:"#2a2a2a",fontFamily:"monospace",fontSize:11}}>No notes found for "{noteSearch}"</div>
          )}
          {noteResults.map((s,i)=>{
            const a=getAct(s.type);
            const d=new Date(s._dk+"T12:00:00");
            const q=noteSearch.toLowerCase();
            const idx=s.notes.toLowerCase().indexOf(q);
            const snippet=s.notes.substring(Math.max(0,idx-20),Math.min(s.notes.length,idx+60));
            return(
              <div key={i} style={{borderTop:"1px solid #141414",padding:"9px 0",display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:11,color:"#444",fontFamily:"monospace",width:90,flexShrink:0}}>{d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"})}</span>
                <span style={{fontSize:10,color:a.color,fontFamily:"monospace",width:40,flexShrink:0}}>{a.icon} {a.short}</span>
                <span style={{fontSize:10,color:"#666",fontFamily:"monospace",flex:1,fontStyle:"italic"}}>
                  {idx>20?"…":""}{snippet.replace(new RegExp(noteSearch,"gi"),m=>`[${m}]`)}{s.notes.length>idx+60?"…":""}
                </span>
              </div>
            );
          })}
        </div>

        {/* ── Projected mileage curve ── */}
        {(projectedRun.length>0||projectedBike.length>0)&&(
          <div style={{background:"#0d0d0d",border:"1px solid #181818",borderRadius:12,padding:"14px 16px"}}>
            <div style={{fontSize:9,letterSpacing:"0.18em",color:"#3a3a3a",fontFamily:"monospace",marginBottom:4}}>PROJECTED MILEAGE — MAX SAFE CURVE</div>
            <div style={{fontSize:9,color:"#2a2a2a",fontFamily:"monospace",marginBottom:12}}>Based on current volume + 10%/week ceiling. Do not exceed these numbers.</div>
            <div style={{display:"grid",gridTemplateColumns:"100px 1fr 60px",gap:"0 8px",marginBottom:6}}>
              <span style={{fontSize:8,color:"#2a2a2a",fontFamily:"monospace"}}>WEEK</span>
              <span style={{fontSize:8,color:"#2a2a2a",fontFamily:"monospace"}}>MAX SAFE</span>
              <span style={{fontSize:8,color:"#2a2a2a",fontFamily:"monospace",textAlign:"right"}}>KM</span>
            </div>
            {projectedRun.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:9,color:C.run,fontFamily:"monospace",marginBottom:7}}>🏃 RUN — from {fmtKm(latestRunKm)} this week</div>
                {projectedRun.map(({week,max,deload})=>(
                  <div key={week} style={{display:"grid",gridTemplateColumns:"100px 1fr 60px",gap:"0 8px",marginBottom:5,alignItems:"center"}}>
                    <span style={{fontSize:9,fontFamily:"monospace",color:deload?"#4CAF70":"#444"}}>{deload?"↓ deload":""}{!deload?`+${week}w`:` +${week}w`}</span>
                    <div style={{height:5,background:"#141414",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${max/projMaxKm*100}%`,background:deload?"#4CAF7066":`${C.run}66`,borderRadius:3,backgroundImage:deload?"none":`repeating-linear-gradient(45deg,transparent,transparent 3px,${C.run}22 3px,${C.run}22 6px)`}}/>
                    </div>
                    <span style={{fontSize:9,fontFamily:"monospace",color:deload?"#4CAF70":C.run,textAlign:"right"}}>{fmtKm(max)}</span>
                  </div>
                ))}
              </div>
            )}
            {projectedBike.length>0&&(
              <div>
                <div style={{fontSize:9,color:C.bike,fontFamily:"monospace",marginBottom:7}}>🚵 RIDE — from {fmtKm(latestBikeKm)} this week</div>
                {projectedBike.map(({week,max,deload})=>(
                  <div key={week} style={{display:"grid",gridTemplateColumns:"100px 1fr 60px",gap:"0 8px",marginBottom:5,alignItems:"center"}}>
                    <span style={{fontSize:9,fontFamily:"monospace",color:deload?"#4CAF70":"#444"}}>{deload?"↓ deload":""}{!deload?`+${week}w`:` +${week}w`}</span>
                    <div style={{height:5,background:"#141414",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${max/projMaxKm*100}%`,background:deload?"#4CAF7066":`${C.bike}66`,borderRadius:3,backgroundImage:deload?"none":`repeating-linear-gradient(45deg,transparent,transparent 3px,${C.bike}22 3px,${C.bike}22 6px)`}}/>
                    </div>
                    <span style={{fontSize:9,fontFamily:"monospace",color:deload?"#4CAF70":C.bike,textAlign:"right"}}>{fmtKm(max)}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:12,background:"#E0603018",border:"1px solid #E0603040",borderRadius:6,padding:"7px 10px",fontSize:10,color:"#E06030",fontFamily:"monospace"}}>⚠ These are ceilings, not targets. Staying below the line is always the right call.</div>
          </div>
        )}
      </div>
    );
  };

  const ExportCopyButton = ({data}) => {
    const [open, setOpen] = useState(false);
    const json = JSON.stringify(data, null, 2);
    return (
      <>
        <button
          style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:6,color:"#3a3a3a",fontSize:10,padding:"6px 14px",cursor:"pointer",fontFamily:"monospace"}}
          onClick={()=>setOpen(v=>!v)}>
          {open?"✕ close export":"⎘ export json"}
        </button>
        {open&&(
          <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setOpen(false)}>
            <div style={{background:"#0d0d0d",border:"1px solid #333",borderRadius:12,padding:20,width:"100%",maxWidth:600,maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:"0.1em"}}>SELECT ALL → COPY → PASTE INTO A .json FILE</span>
                <button onClick={()=>setOpen(false)} style={{background:"transparent",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>✕</button>
              </div>
              <textarea
                readOnly
                defaultValue={json}
                onFocus={e=>e.target.select()}
                style={{flex:1,minHeight:320,background:"#090909",border:"1px solid #1e1e1e",borderRadius:7,color:"#aaa",fontSize:10,fontFamily:"monospace",padding:12,resize:"none",outline:"none",overflowY:"auto"}}
              />
              <div style={{fontSize:9,color:"#333",fontFamily:"monospace"}}>Click the text area — it will auto-select. Then Ctrl+C / Cmd+C to copy.</div>
            </div>
          </div>
        )}
      </>
    );
  };

  const TdCount = ({done,planned,target,color}) => (
    <td style={{padding:"7px 10px"}}>
      <span style={{color:done>=target?color:planned>0?"#666":"#252525",fontFamily:"monospace",fontSize:10}}>
        {done}/{target}{planned>done?<span style={{color:"#333",fontSize:9}}> +{planned-done}</span>:null}
      </span>
    </td>
  );

  // ─────────────────────────────────────────────────────────────────────────
  // MODAL
  // ─────────────────────────────────────────────────────────────────────────
  const isRun  = es?.type==="run";
  const isBike = es?.type==="bike";
  const isStrength = es?.type==="strength_long"||es?.type==="strength_short";
  const actColor = es?.type ? getAct(es.type).color : C.strengthLong;

  if(!loaded) return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",color:"#2a2a2a",fontFamily:"monospace"}}>loading…</div>;

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#ddd",fontFamily:"'Georgia',serif",padding:"20px 16px 60px",position:"relative"}}>
      <div style={{position:"fixed",inset:0,opacity:0.28,pointerEvents:"none",zIndex:0,
        backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E")`}}/>

      {/* Header */}
      <header style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,position:"relative",zIndex:1}}>
        <div>
          <div style={{fontSize:9,letterSpacing:"0.2em",color:"#2e2e2e",fontFamily:"monospace",marginBottom:3}}>TRAINING LOAD PLANNER</div>
          <h1 style={{fontSize:23,fontWeight:"normal",margin:0,color:"#ccc",fontStyle:"italic"}}>Weekly Tracker</h1>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,alignItems:"flex-end"}}>
          <div style={{display:"flex",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:8,overflow:"hidden"}}>
            {[["tracker","Tracker"],["stats","Stats"],["insights","Insights"]].map(([p,l])=>(
              <button key={p} style={{background:page===p?"#161616":"transparent",border:"none",color:page===p?"#D4580A":"#3a3a3a",padding:"7px 16px",cursor:"pointer",fontSize:11,fontFamily:"monospace",letterSpacing:"0.06em"}}
                onClick={()=>setPage(p)}>{l}</button>
            ))}
          </div>
          {page==="tracker"&&(
            <div style={{display:"flex",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:8,overflow:"hidden"}}>
              {[["single","Week"],["multi","4 Weeks"]].map(([m,l])=>(
                <button key={m} style={{background:viewMode===m?"#161616":"transparent",border:"none",color:viewMode===m?"#D4580A":"#3a3a3a",padding:"6px 14px",cursor:"pointer",fontSize:10,fontFamily:"monospace"}}
                  onClick={()=>setViewMode(m)}>{l}</button>
              ))}
            </div>
          )}
        </div>
      </header>

      <div style={{position:"relative",zIndex:1}}>
        {page==="tracker" ? (viewMode==="single"?<SingleWeek/>:<MultiWeek/>) : page==="stats" ? <StatsPage/> : <InsightsPage/>}
      </div>

      {page==="tracker"&&(
        <div style={{background:"#090909",border:"1px solid #141414",borderRadius:10,padding:"11px 15px",marginTop:18,position:"relative",zIndex:1}}>
          <div style={{fontSize:8,letterSpacing:"0.18em",color:"#2e2e2e",fontFamily:"monospace",marginBottom:7}}>INJURY LOAD RULES</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"4px 20px"}}>
            {[["#4CAF70","2–3 rest/easy days per week"],["#F09A50","No BodyPump + Strength back to back"],["#CC2244","Max 2 consecutive hard days before rest"],["#3A78D4","Increase run/ride ≤10% per week"]].map(([c,t])=>(
              <div key={t} style={{fontSize:10,color:"#3e3e3e",fontFamily:"monospace",display:"flex",gap:6}}>
                <span style={{color:c}}>✦</span>{t}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Export / Import ── */}
      <div style={{position:"relative",zIndex:1,marginTop:12,display:"flex",gap:8,justifyContent:"flex-end"}}>
        <ExportCopyButton data={data} />
        <label style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:6,color:"#3a3a3a",fontSize:10,padding:"6px 14px",cursor:"pointer",fontFamily:"monospace"}}>
          ↑ import json
          <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=ev=>{
              try{
                const imported=JSON.parse(ev.target.result);
                if(typeof imported==="object"&&imported!==null){
                  const merged={...data,...imported};
                  persist(merged);
                  alert("Import successful — "+Object.keys(imported).length+" days loaded.");
                } else { alert("Invalid file format."); }
              } catch { alert("Could not parse JSON file."); }
            };
            reader.readAsText(file);
            e.target.value="";
          }}/>
        </label>
      </div>

      {/* ── MODAL ── */}
      {modal&&es&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:18}}
          onClick={closeModal}>
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,width:"100%",maxWidth:600,maxHeight:"93vh",overflowY:"auto"}}
            onClick={e=>e.stopPropagation()}>

            {/* Modal header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"16px 20px 12px",borderBottom:"1px solid #1a1a1a"}}>
              <div>
                <div style={{fontSize:9,color:"#3a3a3a",fontFamily:"monospace",letterSpacing:"0.12em",marginBottom:2}}>
                  {new Date(es._dk+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
                </div>
                <div style={{fontSize:17,color:"#ccc",fontStyle:"italic"}}>
                  {(data[es._dk]||[]).find(s=>s.id===es.id)?"Edit session":"Add session"}
                </div>
              </div>
              <button style={{background:"transparent",border:"none",color:"#3a3a3a",fontSize:16,cursor:"pointer",padding:4}} onClick={closeModal}>✕</button>
            </div>

            <div style={{padding:"14px 20px",display:"flex",flexDirection:"column",gap:14}}>

              {/* Status — at top, completed by default */}
              <FG label="Status">
                <Pills options={["Planned","Completed"]} colors={{Planned:"#555",Completed:C.strengthLong}} value={es.done?"Completed":"Planned"} onChange={v=>setEs({...es,done:v==="Completed"})}/>
              </FG>

              {/* Activity type */}
              <FG label="Activity type">
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {ACTIVITY_TYPES.filter(a=>a.id!=="rest").map(a=>(
                    <button key={a.id} style={{background:es.type===a.id?`${a.color}18`:"transparent",border:`1px solid ${es.type===a.id?a.color:"#222"}`,borderRadius:7,padding:"7px 4px",fontSize:10,cursor:"pointer",fontFamily:"monospace",color:es.type===a.id?a.color:"#4a4a4a",textAlign:"center"}}
                      onClick={()=>setEs({...es,type:a.id,muscles:a.group==="strength"?es.muscles:[]})}>
                      {a.icon} {a.label}
                    </button>
                  ))}
                </div>
              </FG>

              {/* Muscle groups */}
              {isStrength&&(
                <FG label="Muscle groups trained">
                  <div style={{display:"flex",gap:6}}>
                    {MUSCLE_GROUPS.map(mg=>{
                      const sel=(es.muscles||[]).includes(mg.id);
                      return(
                        <button key={mg.id} style={{background:sel?`${C.strengthLong}22`:"transparent",border:`1px solid ${sel?C.strengthLong:"#222"}`,borderRadius:7,padding:"7px 14px",fontSize:11,cursor:"pointer",fontFamily:"monospace",color:sel?C.strengthLong:"#4a4a4a",flex:1}}
                          onClick={()=>{const m=es.muscles||[];setEs({...es,muscles:sel?m.filter(x=>x!==mg.id):[...m,mg.id]})}}>
                          {mg.icon} {mg.label}
                        </button>
                      );
                    })}
                  </div>
                </FG>
              )}

              {/* ── Duration slider + text (hidden for run/bike — they use their own time field) ── */}
              {!isRun&&!isBike&&(
                <FG label="Activity duration">
                  <SliderInput
                    value={es.durationMins||0}
                    onChange={v=>setEs({...es,durationMins:v,durationText:""})}
                    min={0} max={120} step={5}
                    color={actColor} unit=" min"
                  />
                  <input style={{...INP,marginTop:4}} placeholder="Or type your own: e.g. 1h 30, 45 min, 1:20"
                    value={es.durationText}
                    onChange={e=>setEs({...es,durationText:e.target.value,durationMins:parseMins(e.target.value)||es.durationMins})}/>
                </FG>
              )}

              {/* ── Run fields ── */}
              {isRun&&(
                <div style={{background:"#0d0d0d",border:`1px solid ${C.run}22`,borderRadius:9,padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{fontSize:9,letterSpacing:"0.14em",color:C.run,fontFamily:"monospace",opacity:0.7}}>RUN DETAILS</div>
                  <FG label={`Distance (0 – 15 km)`}>
                    <SliderInput value={parseFloat(es.runDistKm)||0} onChange={v=>setEs({...es,runDistKm:v})} min={0} max={15} step={0.5} color={C.run} unit=" km"/>
                    <input style={{...INP,marginTop:4}} placeholder="Or type: e.g. 8.5 km, 10"
                      value={typeof es.runDistKm==="string"&&isNaN(es.runDistKm)?es.runDistKm:es.runDistKm||""}
                      onChange={e=>setEs({...es,runDistKm:e.target.value})}/>
                  </FG>
                  <FG label="Run time">
                    <SliderInput value={es.runTimeMins||0} onChange={v=>setEs({...es,runTimeMins:v,runTimeText:""})} min={0} max={120} step={5} color={C.run} unit=" min"/>
                    <input style={{...INP,marginTop:4}} placeholder="Or type: e.g. 42 min, 1:05"
                      value={es.runTimeText||""}
                      onChange={e=>setEs({...es,runTimeText:e.target.value,runTimeMins:parseMins(e.target.value)||es.runTimeMins})}/>
                  </FG>
                  {(parseKm(es.runDistKm)>0&&(es.runTimeMins>0||parseMins(es.runTimeText)>0))&&(
                    <div style={{fontSize:10,fontFamily:"monospace",color:"#555"}}>
                      Pace: <span style={{color:C.run}}>{((es.runTimeMins||parseMins(es.runTimeText))/parseKm(es.runDistKm)).toFixed(1)} min/km</span>
                    </div>
                  )}
                </div>
              )}

              {/* ── Bike fields ── */}
              {isBike&&(
                <div style={{background:"#0d0d0d",border:`1px solid ${C.bike}22`,borderRadius:9,padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{fontSize:9,letterSpacing:"0.14em",color:C.bike,fontFamily:"monospace",opacity:0.7}}>RIDE DETAILS</div>
                  <FG label={`Distance (0 – 25 km)`}>
                    <SliderInput value={parseFloat(es.bikeDistKm)||0} onChange={v=>setEs({...es,bikeDistKm:v})} min={0} max={25} step={0.5} color={C.bike} unit=" km"/>
                    <input style={{...INP,marginTop:4}} placeholder="Or type: e.g. 18 km, 22.5"
                      value={typeof es.bikeDistKm==="string"&&isNaN(es.bikeDistKm)?es.bikeDistKm:es.bikeDistKm||""}
                      onChange={e=>setEs({...es,bikeDistKm:e.target.value})}/>
                  </FG>
                  <FG label="Ride time">
                    <SliderInput value={es.bikeTimeMins||0} onChange={v=>setEs({...es,bikeTimeMins:v,bikeTimeText:""})} min={0} max={120} step={5} color={C.bike} unit=" min"/>
                    <input style={{...INP,marginTop:4}} placeholder="Or type: e.g. 55 min, 1:20"
                      value={es.bikeTimeText||""}
                      onChange={e=>setEs({...es,bikeTimeText:e.target.value,bikeTimeMins:parseMins(e.target.value)||es.bikeTimeMins})}/>
                  </FG>
                  {(parseKm(es.bikeDistKm)>0&&(es.bikeTimeMins>0||parseMins(es.bikeTimeText)>0))&&(
                    <div style={{fontSize:10,fontFamily:"monospace",color:"#555"}}>
                      Pace: <span style={{color:C.bike}}>{((es.bikeTimeMins||parseMins(es.bikeTimeText))/parseKm(es.bikeDistKm)).toFixed(1)} min/km</span>
                    </div>
                  )}
                </div>
              )}

              {/* Intensity */}
              <FG label="Intensity">
                <Pills options={INTENSITY_LEVELS} colors={INTENSITY_COLORS} value={es.intensity} onChange={v=>setEs({...es,intensity:v})}/>
              </FG>

              {/* Fatigue */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <FG label="Fatigue going in"><Pills options={FATIGUE_LEVELS} colors={FATIGUE_COLORS} value={es.fatigue_pre} onChange={v=>setEs({...es,fatigue_pre:v})} small/></FG>
                <FG label="Fatigue after">   <Pills options={FATIGUE_LEVELS} colors={FATIGUE_COLORS} value={es.fatigue_post} onChange={v=>setEs({...es,fatigue_post:v})} small/></FG>
              </div>

              {/* Food */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <FG label="Food before"><input style={INP} placeholder="e.g. banana, fasted" value={es.food_pre||""} onChange={e=>setEs({...es,food_pre:e.target.value})}/></FG>
                <FG label="Food after"> <input style={INP} placeholder="e.g. protein shake"  value={es.food_post||""} onChange={e=>setEs({...es,food_post:e.target.value})}/></FG>
              </div>

              {/* Notes */}
              <FG label="Notes">
                <textarea style={{...INP,height:52,resize:"vertical"}} placeholder="How did it feel? Any leg niggles?" value={es.notes||""} onChange={e=>setEs({...es,notes:e.target.value})}/>
              </FG>

            </div>

            <div style={{display:"flex",justifyContent:"flex-end",gap:9,padding:"11px 20px 16px",borderTop:"1px solid #1a1a1a"}}>
              {(data[es._dk]||[]).find(s=>s.id===es.id)&&(
                <button style={{background:"transparent",border:"1px solid #250e0e",borderRadius:6,color:"#CC2244",fontSize:10,padding:"7px 14px",cursor:"pointer",fontFamily:"monospace",marginRight:"auto"}}
                  onClick={()=>{delSess(es._dk,es.id);closeModal();}}>Delete</button>
              )}
              <button style={{background:C.strengthLong,border:"none",borderRadius:6,color:"#0a0a0a",fontSize:11,padding:"8px 20px",cursor:"pointer",fontFamily:"monospace",fontWeight:"bold"}}
                onClick={handleSave}>Save session</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sub-components ───────────────────────────────────────────────────────────
const FG = ({label,children}) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <label style={{fontSize:9,color:"#3a3a3a",letterSpacing:"0.14em",fontFamily:"monospace"}}>{label}</label>
    {children}
  </div>
);

const Pills = ({options,colors,value,onChange,small}) => (
  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
    {options.map(o=>{const c=colors[o]||"#666",active=value===o;return(
      <button key={o} style={{background:active?`${c}18`:"transparent",border:`1px solid ${active?c:"#1e1e1e"}`,borderRadius:20,padding:small?"3px 9px":"4px 12px",fontSize:small?10:11,color:active?c:"#3e3e3e",cursor:"pointer",fontFamily:"monospace"}}
        onClick={()=>onChange(o)}>{o}</button>
    );})}
  </div>
);

const BT = { nav:{background:"transparent",border:"1px solid #1a1a1a",borderRadius:6,color:"#444",padding:"6px 12px",cursor:"pointer",fontSize:13,fontFamily:"monospace"} };
const CD = { target:{background:"#0e0e0e",border:"1px solid #181818",borderRadius:8,padding:"10px 12px"} };
const CH = { week:{fontSize:8,letterSpacing:"0.14em",color:"#D4580A",fontFamily:"monospace",background:"#D4580A10",border:"1px solid #D4580A28",borderRadius:3,padding:"2px 6px",display:"inline-block",marginTop:2} };
const INP = {background:"#090909",border:"1px solid #1a1a1a",borderRadius:6,padding:"7px 10px",color:"#bbb",fontSize:11,fontFamily:"monospace",outline:"none",width:"100%",boxSizing:"border-box"};


window._mountReact = () => {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
};

// If already unlocked (session), React may mount before module script sets _mountReact
// so we also try immediately
if (sessionStorage.getItem("td_unlocked")) {
  window._mountReact && window._mountReact();
}
